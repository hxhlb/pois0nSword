<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>posi0nSword</title>
    <style>
        :root {
            --text: #f0f0f3;
            --text-dim: #9a9aa2;
            --green: #34d65f;
            --green-soft: #5ee07f;
            --green-dim: #1f7a37;
            --cyan: #57c7ff;
            --magenta: #c792ea;
            --ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            --glass: rgba(24, 24, 28, 0.5);
            --glass-strong: rgba(26, 26, 31, 0.6);
            --hairline: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ---- Glass console (full bleed) ---- */
        .console {
            position: relative;
            z-index: 1;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 20px 20px;
            margin:10px;
            font-size: 13.5px;
            line-height: 1.6;
            color: var(--text);
            height: 75%;
            
            width:90%;
            border-radius: 50px;
            -webkit-overflow-scrolling: touch;
        }

        .console::-webkit-scrollbar {
            width: 8px;
        }

        .console::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 4px;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--ui);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            background: #0a0c0b;
            position: relative;
        }

        /* ---- Ambient backdrop (what the glass refracts) ---- */
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: 0;
            background:
                radial-gradient(40% 50% at 18% 10%, rgba(52, 214, 95, 0.22), transparent 70%),
                radial-gradient(46% 56% at 88% 20%, rgba(40, 120, 220, 0.18), transparent 70%),
                radial-gradient(60% 60% at 70% 96%, rgba(52, 214, 95, 0.16), transparent 72%),
                radial-gradient(50% 50% at 24% 90%, rgba(150, 80, 230, 0.14), transparent 72%),
                #0a0c0b;
            animation: drift 22s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from {
                transform: translate3d(-2%, -1%, 0) scale(1.02);
            }

            to {
                transform: translate3d(2%, 2%, 0) scale(1.08);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 16px;
            background: #101216;
            color: #e7e7e7;
        }

        .glass {
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
        }

        /* ---- Modal (About / Credits) ---- */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(5, 6, 6, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transition: background 0.4s ease, backdrop-filter 0.4s ease, -webkit-backdrop-filter 0.4s ease;
        }

        .overlay[data-open="true"],
        .overlay[data-open="closing"] {
            display: flex;
        }

        .overlay[data-open="true"] {
            background: rgba(5, 6, 6, 0.42);
            backdrop-filter: blur(9px);
            -webkit-backdrop-filter: blur(9px);
        }
/* ---- Glass control bar ---- */
.bar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      border-radius: 60px;
      margin:15px;
      justify-content: space-between;
      -webkit-justify-content: space-between;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    }

    .status {
      display: flex;
      align-items: center;
      padding: 7px 12px 7px 10px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.2s ease;
    }

    .status .dot {
      position: relative;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .status .dot::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px solid var(--green);
      opacity: 0;
      animation: ping 2.4s ease-out infinite;
    }

    @keyframes ping {
      0% {
        transform: scale(0.6);
        opacity: 0.7;
      }

      70% {
        transform: scale(1.6);
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    .status .label {
      text-transform: uppercase;
    }

    .status[data-state="running"] {
      color: #ffe27a;
    }

    .status[data-state="running"] .dot {
      background: #ffd60a;
    }

    .status[data-state="running"] .dot::after {
      border-color: #ffd60a;
      animation-duration: 1s;
    }

    .status[data-state="done"] {
      color: var(--green-soft);
    }

    a {
      color: var(--green-soft);
    }
        .overlay[data-open="closing"] {
            background: rgba(5, 6, 6, 0);
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            transition-duration: 0.24s;
        }

        .modal {
            position: relative;
            width: min(420px, 100%);
            border-radius: 20px;
            background: rgba(30, 30, 36, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 80px -24px rgba(0, 0, 0, 0.7);
            padding: 22px;
            transform-origin: center bottom;
        }

        /* expanding halo ring that blooms behind the card on open */
        .modal::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            pointer-events: none;
            box-shadow: 0 0 0 0 rgba(52, 214, 95, 0.45);
            opacity: 0;
        }

        /* glass light-sweep that rakes across the surface as it lands */
        .modal::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            pointer-events: none;
            background: linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.16) 50%, transparent 65%);
            background-size: 250% 100%;
            background-position: 120% 0;
            opacity: 0;
        }

        .overlay[data-open="true"] .modal {
            animation: modalSpring 0.62s cubic-bezier(0.18, 1.0, 0.28, 1.06) both;
        }

        .overlay[data-open="true"] .modal::after {
            animation: modalHalo 0.7s ease-out 0.06s both;
        }

        .overlay[data-open="true"] .modal::before {
            animation: modalSweep 0.7s ease-out 0.14s both;
        }

        .overlay[data-open="closing"] .modal {
            animation: modalOut 0.22s cubic-bezier(0.4, 0, 1, 0.6) both;
        }

        @keyframes modalSpring {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
                filter: blur(6px);
            }

            55% {
                opacity: 1;
                transform: translateY(-4px) scale(1.015);
                filter: blur(0);
            }

            78% {
                transform: translateY(1px) scale(0.997);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes modalHalo {
            0% {
                opacity: 0.9;
                box-shadow: 0 0 0 0 rgba(52, 214, 95, 0.5);
            }

            100% {
                opacity: 0;
                box-shadow: 0 0 0 22px rgba(52, 214, 95, 0);
            }
        }

        @keyframes modalSweep {
            0% {
                opacity: 0;
                background-position: 120% 0;
            }

            25% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                background-position: -40% 0;
            }
        }

        @keyframes modalOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }
        }

        /* staggered entrance for the inner content */
        .overlay[data-open="true"] .modal>h2,
        .overlay[data-open="true"] .modal>#modalBody,
        .overlay[data-open="true"] .modal>.close {
            animation: modalContent 0.5s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }

        .overlay[data-open="true"] .modal>h2 {
            animation-delay: 0.14s;
        }

        .overlay[data-open="true"] .modal>#modalBody {
            animation-delay: 0.2s;
        }

        .overlay[data-open="true"] .modal>.close {
            animation-delay: 0.28s;
        }

        @keyframes modalContent {
            from {
                opacity: 0;
                transform: translateY(9px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .overlay,
            .overlay .modal,
            .overlay .modal::before,
            .overlay .modal::after,
            .overlay[data-open="true"] .modal>* {
                animation: none !important;
                transition: opacity 0.15s ease !important;
            }
        }

        .modal h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--green);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 10px;
        }

        .modal .muted {
            color: var(--text-dim);
            font-size: 13px;
        }

        .modal code {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--green-soft);
            background: rgba(52, 214, 95, 0.1);
            padding: 1px 6px;
            border-radius: 5px;
        }

        .modal .rows {
            margin-top: 6px;
        }

        .modal .row {
            display: grid;
            grid-template-columns: minmax(64px, auto) 1fr;
            column-gap: 16px;
            align-items: baseline;
            font-size: 12.5px;
            line-height: 1.5;
            padding: 8px 0;
            border-top: 1px solid var(--hairline);
        }

        .modal .row .k {
            color: var(--text-dim);
            white-space: nowrap;
        }

        .modal .row .v {
            color: var(--text);
            text-align: right;
            overflow-wrap: anywhere;
            word-break: break-word;
            hyphens: auto;
        }

        .modal .close {
            appearance: none;
            margin-top: 16px;
            width: 100%;
            padding: 11px;
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--hairline);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .modal .close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .modal .close:active {
            transform: scale(0.98);
        }

        @media (max-width: 460px) {
            .track-pct {
                display: none;
            }

            .run {
                margin-left: 6px;
            }

            .title .sub {
                display: none;
            }
        }

        /* ---- Top bar ---- */
        .topbar {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 10px 14px calc(10px + env(safe-area-inset-top)) 14px;
            background: rgba(26, 26, 31, 0);
            border-radius: 50px;
        }

        .topbar .left {
            justify-self: start;
        }

        .topbar .right {
            justify-self: end;
        }

        .topbtn {
            appearance: none;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 0.02em;
            padding: 7px 12px;
            border-radius: 9px;
            cursor: pointer;
            transition: color 0.15s ease, background 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .topbtn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
        }

        .topbtn:active {
            transform: scale(0.96);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.02em;
            padding: 7px 14px;
            user-select: none;
        }



        .ok {
            color: #66ff99;
        }

        .warn {
            color: #ffd36a;
        }

        .fail {
            color: #ff7777;
        }
    </style>

</head>
